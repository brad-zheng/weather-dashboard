<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气数据看板 · WEATHER HUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="data.js"></script>
    <style>
        /* ── 底层：科技网格背景 ─────────────────────── */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #050810;
            min-height: 100vh;
            color: #e2e8f0;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(0,180,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,180,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        /* 扫描线 */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.08) 2px,
                rgba(0,0,0,0.08) 4px
            );
        }
        #dashboard { position: relative; z-index: 1; }

        /* ── 玻璃面板 ─────────────────────────────── */
        .glass-panel {
            background: rgba(8, 20, 50, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 180, 255, 0.18);
            border-radius: 14px;
            box-shadow:
                0 0 20px rgba(0, 180, 255, 0.07),
                inset 0 1px 0 rgba(255,255,255,0.06),
                0 8px 32px rgba(0,0,0,0.5);
            position: relative;
        }
        .glass-panel::before {
            content: '';
            position: absolute; inset: 0; border-radius: 14px;
            background: linear-gradient(135deg, rgba(0,180,255,0.05) 0%, transparent 60%);
            pointer-events: none;
        }
        /* 面板辉光边框 hover */
        .glass-panel:hover {
            border-color: rgba(0, 180, 255, 0.35);
            box-shadow:
                0 0 30px rgba(0, 180, 255, 0.12),
                inset 0 1px 0 rgba(255,255,255,0.08),
                0 8px 40px rgba(0,0,0,0.6);
        }
        /* 发光彩条（顶部装饰条） */
        .glow-bar {
            height: 2px;
            border-radius: 2px 2px 0 0;
            box-shadow: 0 0 8px currentColor, 0 0 16px currentColor;
        }
        .glow-bar-blue   { background: #38bdf8; color: #38bdf8; }
        .glow-bar-red    { background: #f87171; color: #f87171; }
        .glow-bar-green  { background: #34d399; color: #34d399; }
        .glow-bar-purple { background: #a78bfa; color: #a78bfa; }
        .glow-bar-amber  { background: #fbbf24; color: #fbbf24; }

        /* ── 标题栏 ───────────────────────────────── */
        .hud-header {
            background: rgba(4, 10, 28, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 180, 255, 0.15);
            border-radius: 14px;
        }
        .hud-title {
            font-size: 18px; font-weight: 800;
            letter-spacing: 2px; color: #e0f2fe;
            text-shadow: 0 0 20px rgba(56,189,248,0.6);
        }
        .hud-sub {
            font-size: 11px; color: rgba(148,163,184,0.7);
            letter-spacing: 1px;
        }
        .hud-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #34d399; box-shadow: 0 0 8px #34d399;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .hud-dot.warn { background: #fbbf24; box-shadow: 0 0 8px #fbbf24; }
        .hud-dot.err  { background: #f87171; box-shadow: 0 0 8px #f87171; }

        /* ── KPI 卡片 ──────────────────────────────── */
        .kpi-card {
            background: rgba(8, 18, 45, 0.6);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 180, 255, 0.12);
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
            box-shadow: 0 0 15px rgba(0,180,255,0.05);
        }
        .kpi-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 180, 255, 0.3);
            box-shadow: 0 0 25px rgba(0,180,255,0.15), 0 12px 30px rgba(0,0,0,0.4);
        }
        .kpi-card:hover .kpi-value {
            text-shadow: 0 0 20px currentColor;
        }
        .kpi-label {
            font-size: 11px; color: rgba(148,163,184,0.8);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-bottom: 6px;
        }
        .kpi-value {
            font-size: 30px; font-weight: 900;
            line-height: 1; letter-spacing: -1px;
            transition: text-shadow 0.3s;
        }
        .kpi-en {
            font-size: 10px; color: rgba(100,116,139,0.6);
            letter-spacing: 1.5px; text-transform: uppercase;
            margin-top: 5px;
        }
        .kpi-icon {
            font-size: 28px; opacity: 0.8;
            filter: drop-shadow(0 0 6px currentColor);
        }
        .kpi-red    .kpi-value { color: #f87171; }
        .kpi-blue   .kpi-value { color: #38bdf8; }
        .kpi-green  .kpi-value { color: #34d399; }
        .kpi-purple .kpi-value { color: #a78bfa; }
        .kpi-amber  .kpi-value { color: #fbbf24; }

        /* ── 按钮 ─────────────────────────────────── */
        .btn-hud {
            padding: 7px 16px; border-radius: 8px;
            border: 1px solid rgba(0,180,255,0.3);
            background: rgba(0,180,255,0.08);
            color: #7dd3fc; font-size: 13px; cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 5px;
        }
        .btn-hud:hover {
            background: rgba(0,180,255,0.18);
            border-color: rgba(0,180,255,0.6);
            color: #bae6fd;
            box-shadow: 0 0 12px rgba(0,180,255,0.2);
        }
        .btn-primary {
            padding: 7px 18px; border-radius: 8px;
            background: linear-gradient(135deg, rgba(0,180,255,0.25), rgba(56,189,248,0.15));
            border: 1px solid rgba(0,180,255,0.4);
            color: #7dd3fc; font-size: 13px; cursor: pointer; font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            box-shadow: 0 0 14px rgba(0,180,255,0.15);
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, rgba(0,180,255,0.35), rgba(56,189,248,0.25));
            border-color: rgba(0,180,255,0.7);
            color: #e0f2fe;
            box-shadow: 0 0 20px rgba(0,180,255,0.3);
        }
        .btn-screenshot {
            padding: 7px 16px; border-radius: 8px;
            background: linear-gradient(135deg, rgba(251,191,36,0.2), rgba(245,158,11,0.12));
            border: 1px solid rgba(251,191,36,0.35);
            color: #fcd34d; font-size: 13px; cursor: pointer; font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            display: flex; align-items: center; gap: 5px;
            box-shadow: 0 0 12px rgba(251,191,36,0.1);
        }
        .btn-screenshot:hover {
            background: linear-gradient(135deg, rgba(251,191,36,0.3), rgba(245,158,11,0.2));
            border-color: rgba(251,191,36,0.6);
            box-shadow: 0 0 18px rgba(251,191,36,0.25);
        }

        /* ── 城市搜索 ──────────────────────────────── */
        .city-input {
            width: 180px; padding: 7px 32px 7px 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,180,255,0.25);
            background: rgba(0,0,0,0.3);
            color: #e2e8f0; font-size: 13px; outline: none;
            transition: all 0.2s;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .city-input::placeholder { color: rgba(148,163,184,0.4); }
        .city-input:focus {
            border-color: rgba(0,180,255,0.6);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 12px rgba(0,180,255,0.15), inset 0 1px 3px rgba(0,0,0,0.3);
        }
        .city-clear-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            color: rgba(148,163,184,0.5); cursor: pointer; font-size: 14px; display: none;
        }
        .city-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0; right: 0;
            background: rgba(6, 14, 36, 0.97);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,180,255,0.2);
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 15px rgba(0,180,255,0.05);
            max-height: 260px; overflow-y: auto; z-index: 9999; display: none;
        }
        .city-dropdown.open { display: block; }
        .city-dropdown-item {
            padding: 9px 14px; font-size: 13px; cursor: pointer;
            color: #94a3b8; transition: all 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .city-dropdown-item:hover {
            background: rgba(0,180,255,0.1);
            color: #7dd3fc;
        }
        .city-dropdown-item .prov { font-size: 11px; color: rgba(100,116,139,0.5); margin-left: 6px; }

        /* ── 多城市对比 ────────────────────────────── */
        .cmp-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
        .cmp-tab {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 12px; border-radius: 20px;
            background: rgba(0,180,255,0.08);
            border: 1px solid rgba(0,180,255,0.2);
            color: #7dd3fc; font-size: 12px;
            cursor: pointer; transition: all 0.15s;
        }
        .cmp-tab:hover { background: rgba(0,180,255,0.15); border-color: rgba(0,180,255,0.4); }
        .cmp-tab .remove {
            width: 16px; height: 16px; border-radius: 50%;
            background: rgba(0,180,255,0.15);
            display: flex; align-items: center; justify-content: center; font-size: 10px; color: #7dd3fc;
        }
        .cmp-tab .remove:hover { background: rgba(248,113,113,0.2); color: #f87171; }
        .cmp-add-btn {
            padding: 5px 14px; border-radius: 20px;
            background: transparent;
            border: 1px dashed rgba(0,180,255,0.25);
            color: rgba(125,211,252,0.5);
            cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 4px;
            transition: all 0.15s;
        }
        .cmp-add-btn:hover { background: rgba(0,180,255,0.08); border-color: rgba(0,180,255,0.4); color: #7dd3fc; }
        .cmp-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ── 城市选择弹窗 ──────────────────────────── */
        .city-picker-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            z-index: 10000; display: none; align-items: center; justify-content: center;
        }
        .city-picker-overlay.open { display: flex; }
        .city-picker-modal {
            background: rgba(6, 14, 36, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0,180,255,0.2);
            border-radius: 14px;
            width: 90%; max-width: 400px; max-height: 70vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 30px rgba(0,180,255,0.08);
        }
        .city-picker-header {
            padding: 16px; border-bottom: 1px solid rgba(0,180,255,0.12);
            display: flex; justify-content: space-between; align-items: center;
            color: #7dd3fc; font-weight: 700; font-size: 15px; letter-spacing: 1px;
        }
        .city-picker-search { padding: 12px 16px; border-bottom: 1px solid rgba(0,180,255,0.1); }
        .city-picker-search input {
            width: 100%; padding: 8px 12px; border-radius: 8px;
            border: 1px solid rgba(0,180,255,0.2);
            background: rgba(0,0,0,0.3);
            color: #e2e8f0; font-size: 14px; outline: none;
        }
        .city-picker-search input:focus { border-color: rgba(0,180,255,0.5); }
        .city-picker-list { overflow-y: auto; max-height: 300px; }
        .city-picker-item {
            padding: 10px 16px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
            color: #94a3b8; transition: all 0.15s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .city-picker-item:hover { background: rgba(0,180,255,0.08); color: #7dd3fc; }
        .city-picker-item .prov { color: rgba(100,116,139,0.5); font-size: 12px; }

        /* ── 图表标题区 ────────────────────────────── */
        .chart-title {
            font-size: 13px; font-weight: 700;
            color: #7dd3fc; letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .chart-sub { font-size: 11px; color: rgba(100,116,139,0.6); letter-spacing: 0.5px; }

        /* ── 数据表格 ─────────────────────────────── */
        .data-table th {
            background: rgba(0,180,255,0.06);
            border-bottom: 1px solid rgba(0,180,255,0.12);
            color: rgba(148,163,184,0.8);
            font-weight: 600; font-size: 12px;
            letter-spacing: 1px;
            padding: 10px 12px;
        }
        .data-table td {
            padding: 8px 12px; font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #94a3b8;
        }
        .data-table tr:hover td { background: rgba(0,180,255,0.04); }
        .today-row td { background: rgba(251,191,36,0.06) !important; color: #fcd34d !important; }

        /* ── 折叠按钮 ─────────────────────────────── */
        .collapse-btn {
            padding: 5px 12px; border-radius: 8px;
            background: rgba(0,180,255,0.08);
            border: 1px solid rgba(0,180,255,0.2);
            color: rgba(125,211,252,0.7);
            cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 4px; transition: all 0.15s;
        }
        .collapse-btn:hover { background: rgba(0,180,255,0.15); border-color: rgba(0,180,255,0.4); color: #7dd3fc; }

        /* ── 滚动条 ───────────────────────────────── */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,180,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,180,255,0.4); }

        /* ── 加载动画 ─────────────────────────────── */
        .spinner {
            width: 44px; height: 44px;
            border: 2px solid rgba(0,180,255,0.15);
            border-top-color: rgba(0,180,255,0.8);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── 数字跳动 ─────────────────────────────── */
        @keyframes num-in {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .kpi-value { animation: num-in 0.4s ease-out; }

        /* ── 响应式 ───────────────────────────────── */
        @media (max-width: 640px) {
            .city-input { width: 140px; }
        }
    </style>
</head>
<body>
<div class="max-w-7xl mx-auto px-4 py-5" id="dashboard">

    <!-- ══ 标题栏 ══════════════════════════════════════ -->
    <div class="hud-header p-5 mb-5 flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-4">
            <!-- 雷达图标 SVG -->
            <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="22" cy="22" r="20" stroke="rgba(56,189,248,0.3)" stroke-width="1"/>
                <circle cx="22" cy="22" r="13" stroke="rgba(56,189,248,0.2)" stroke-width="1"/>
                <circle cx="22" cy="22" r="6" stroke="rgba(56,189,248,0.4)" stroke-width="1"/>
                <line x1="22" y1="22" x2="38" y2="10" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round">
                    <animateTransform attributeName="transform" type="rotate" from="0 22 22" to="360 22 22" dur="4s" repeatCount="indefinite"/>
                </line>
                <circle cx="22" cy="22" r="2" fill="#38bdf8"/>
            </svg>
            <div>
                <div class="hud-title">天气数据看板</div>
                <div class="hud-sub flex items-center gap-3" style="margin-top:4px;">
                    <span>近14日 · 3年对比</span>
                    <span class="flex items-center gap-1.5" id="dataStatusBadge">
                        <span class="hud-dot" id="dataStatusDot"></span>
                        <span id="dataStatusText" style="font-size:10px;">数据就绪</span>
                    </span>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap items-center gap-2">
            <div style="position:relative;" id="mainSearchWrap">
                <input type="text" id="mainCityInput" class="city-input" placeholder="🔍 搜索城市..." autocomplete="off" />
                <span class="city-clear-btn" id="mainCityClear" onclick="clearMainCity()">✕</span>
                <div class="city-dropdown" id="mainCityDropdown"></div>
            </div>
            <button class="btn-hud" onclick="reloadCity()">↺ 刷新</button>
            <button class="btn-screenshot" onclick="takeScreenshot()">📸 截图</button>
        </div>
    </div>

    <!-- ══ KPI 四卡片 ════════════════════════════════════ -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-5">
        <!-- 最高温 -->
        <div class="kpi-card kpi-red p-4">
            <div class="glow-bar glow-bar-red mb-3"></div>
            <div class="flex items-start justify-between">
                <div>
                    <div class="kpi-label">最高气温</div>
                    <div class="kpi-value" id="k1">--°C</div>
                    <div class="kpi-en">℃</div>
                </div>
                <div class="kpi-icon" style="color:#f87171;">▲</div>
            </div>
        </div>
        <!-- 最低温 -->
        <div class="kpi-card kpi-blue p-4">
            <div class="glow-bar glow-bar-blue mb-3"></div>
            <div class="flex items-start justify-between">
                <div>
                    <div class="kpi-label">最低气温</div>
                    <div class="kpi-value" id="k2">--°C</div>
                    <div class="kpi-en">℃</div>
                </div>
                <div class="kpi-icon" style="color:#38bdf8;">▼</div>
            </div>
        </div>
        <!-- 天气状况 -->
        <div class="kpi-card kpi-green p-4">
            <div class="glow-bar glow-bar-green mb-3"></div>
            <div class="flex items-start justify-between">
                <div>
                    <div class="kpi-label">天气状况</div>
                    <div class="kpi-value" id="k3" style="font-size:20px;">--</div>
                    <div class="kpi-en">实时天气</div>
                </div>
                <div class="kpi-icon" style="color:#34d399;">◈</div>
            </div>
        </div>
        <!-- 穿衣建议 -->
        <div class="kpi-card kpi-purple p-4">
            <div class="glow-bar glow-bar-purple mb-3"></div>
            <div class="flex items-start justify-between">
                <div>
                    <div class="kpi-label">穿衣建议</div>
                    <div class="kpi-value" id="k4" style="font-size:18px;">--</div>
                    <div class="kpi-en">和风天气</div>
                </div>
                <div class="kpi-icon" style="color:#a78bfa;">✦</div>
            </div>
        </div>
    </div>

    <!-- ══ 温度折线图 ══════════════════════════════════ -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">
        <div class="glass-panel p-5">
            <div class="chart-title">▲ 最高气温 · 3年曲线对比</div>
            <div class="chart-sub mb-3">— 红色虚线 = 今日</div>
            <div style="height:260px"><canvas id="c1"></canvas></div>
        </div>
        <div class="glass-panel p-5">
            <div class="chart-title">▼ 最低气温 · 3年曲线对比</div>
            <div class="chart-sub mb-3">— 红色虚线 = 今日</div>
            <div style="height:260px"><canvas id="c2"></canvas></div>
        </div>
    </div>

    <!-- ══ 多城市对比 ══════════════════════════════════ -->
    <div class="glass-panel p-5 mb-5">
        <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
            <div>
                <div class="chart-title">◈ 多城市对比</div>
                <div class="chart-sub">最多5个城市 · 同年份对比</div>
            </div>
            <button class="btn-primary" onclick="runCompare()">▶ 开始对比</button>
        </div>
        <div class="cmp-tabs" id="cmpTabs">
            <button class="cmp-add-btn" id="cmpAddBtn" onclick="openCityPicker()">＋ 添加城市</button>
        </div>
        <div id="cmpChartsArea" style="display:none;">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div>
                    <div class="chart-sub mb-2" style="color:#f87171;font-weight:600;">▲ MAX TEMP</div>
                    <div style="height:230px"><canvas id="c3"></canvas></div>
                </div>
                <div>
                    <div class="chart-sub mb-2" style="color:#38bdf8;font-weight:600;">▼ MIN TEMP</div>
                    <div style="height:230px"><canvas id="c4"></canvas></div>
                </div>
            </div>
        </div>
        <div id="cmpEmpty" style="text-align:center;padding:40px 0;color:rgba(100,116,139,0.4);font-size:13px;letter-spacing:1px;">
            + 点击上方「添加城市」开始对比
        </div>
    </div>

    <!-- ══ 详细数据表 ══════════════════════════════════ -->
    <div class="glass-panel p-5">
        <div class="flex items-center justify-between mb-4">
            <div>
                <div class="chart-title">▤ 详细数据表</div>
                <div class="chart-sub">3年历史数据 · 当年数据高亮</div>
            </div>
            <button class="collapse-btn" onclick="toggleTable()">
                <span id="tableToggleIcon">◉</span><span id="tableToggleText">隐藏</span>
            </button>
        </div>
        <div id="tableSection">
            <div class="overflow-x-auto">
                <table class="w-full data-table" style="border-collapse:collapse;">
                    <thead>
                        <tr>
                            <th class="text-left" style="border-radius:8px 0 0 8px;">日期</th>
                            <th class="text-center" id="th24a">-- 高</th>
                            <th class="text-center" id="th24b">-- 低</th>
                            <th class="text-center" id="th25a">-- 高</th>
                            <th class="text-center" id="th25b">-- 低</th>
                            <th class="text-center" style="color:#f87171;" id="th26a">-- 高</th>
                            <th class="text-center" style="color:#38bdf8;border-radius:0 8px 8px 0;" id="th26b">-- 低</th>
                        </tr>
                    </thead>
                    <tbody id="tb"></tbody>
                </table>
            </div>
        </div>
    </div>

</div><!-- /dashboard -->

<!-- ══ 城市选择弹窗 ════════════════════════════════════ -->
<div class="city-picker-overlay" id="cityPickerOverlay" onclick="closeCityPicker(event)">
    <div class="city-picker-modal" onclick="event.stopPropagation()">
        <div class="city-picker-header">
            <span>选择城市</span>
            <button onclick="closeCityPicker()" style="background:none;border:none;font-size:18px;color:rgba(148,163,184,0.5);cursor:pointer;">✕</button>
        </div>
        <div class="city-picker-search">
            <input type="text" id="pickerSearch" placeholder="搜索城市..." oninput="filterPickerCities(this.value)" />
        </div>
        <div class="city-picker-list" id="pickerList"></div>
    </div>
</div>

<!-- ══ 截图提示 ════════════════════════════════════════ -->
<div id="screenshotToast" class="hidden" style="position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(6,14,36,0.97);border:1px solid rgba(0,180,255,0.3);color:#7dd3fc;padding:12px 24px;border-radius:10px;font-size:13px;z-index:10001;box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 15px rgba(0,180,255,0.1);letter-spacing:0.5px;">
    ✓ DONE
</div>

<script>
// ── 全局变量 ────────────────────────────────────────────
let ch1, ch2, ch3, ch4;
let currentCity = null;
let cmpCities = [];
let tableCollapsed = false;
let cityList = [];
let currentYear = new Date().getFullYear();
let yearKeys = [`${(currentYear-2)%100}`, `${(currentYear-1)%100}`, `${currentYear%100}`];

// ── 初始化 ──────────────────────────────────────────────
(function init() {
    document.getElementById('th24a').textContent = `${currentYear-2} 最高`;
    document.getElementById('th24b').textContent = `${currentYear-2} 最低`;
    document.getElementById('th25a').textContent = `${currentYear-1} 最高`;
    document.getElementById('th25b').textContent = `${currentYear-1} 最低`;
    document.getElementById('th26a').textContent = `${currentYear} 最高`;
    document.getElementById('th26b').textContent = `${currentYear} 最低`;

    if (typeof CITIES === 'undefined' || typeof WEATHER_DATA === 'undefined') {
        setDataStatus('err', '●', 'DATA LOAD FAILED');
        return;
    }
    const firstCity = Object.keys(WEATHER_DATA)[0];
    const yk = WEATHER_DATA[firstCity] ? Object.keys(WEATHER_DATA[firstCity]).sort().slice(-3) : [];
    console.log('[init] yearKeys:', yk, 'firstCity:', firstCity, 'DATA_DATE:', DATA_DATE);
    setDataStatus('ok', '●', `数据日期: ${DATA_DATE || '未知'}`);
    cityList = Object.keys(CITIES).map(name => ({ name, ...CITIES[name] }));
    initMainSearch();
    renderPickerList(cityList);
})();

// ── 数据状态 ─────────────────────────────────────────────
function setDataStatus(type, dot, text) {
    const badge = document.getElementById('dataStatusBadge');
    badge.querySelector('.hud-dot').className = `hud-dot ${type !== 'ok' ? type : ''}`;
    document.getElementById('dataStatusText').textContent = text;
}

// ── 主城市搜索 ───────────────────────────────────────────
let mainSearchCtrl;
function initMainSearch() {
    const inp = document.getElementById('mainCityInput');
    const drop = document.getElementById('mainCityDropdown');
    const clr = document.getElementById('mainCityClear');
    mainSearchCtrl = createCitySearch(inp, drop, (name) => { loadCity(name); }, clr);
}

function clearMainCity() {
    mainSearchCtrl && mainSearchCtrl.clear();
    currentCity = null;
    ['k1','k2','k3','k4'].forEach(id => document.getElementById(id).textContent = id === 'k3' ? '--' : '--°');
    document.getElementById('tb').innerHTML = '';
    if (ch1) { ch1.destroy(); ch1 = null; }
    if (ch2) { ch2.destroy(); ch2 = null; }
    if (ch3) { ch3.destroy(); ch3 = null; }
    if (ch4) { ch4.destroy(); ch4 = null; }
}

function reloadCity() {
    const val = document.getElementById('mainCityInput').value.trim();
    if (val && CITIES[val]) loadCity(val);
}

// ── 城市搜索组件 ──────────────────────────────────────────
function createCitySearch(inputEl, dropdownEl, onSelect, clearBtnEl) {
    let filtered = [];
    let activeIdx = -1;
    function search(q) {
        if (!q) { filtered = []; dropdownEl.classList.remove('open'); return; }
        filtered = cityList.filter(c => c.name.includes(q) || c.province.includes(q)).slice(0, 50);
        activeIdx = -1; render();
    }
    function render() {
        if (filtered.length === 0) { dropdownEl.classList.remove('open'); return; }
        dropdownEl.innerHTML = filtered.map((c, i) =>
            `<div class="city-dropdown-item ${i===activeIdx?'active':''}" data-idx="${i}">${c.name}<span class="prov">${c.province}</span></div>`
        ).join('');
        dropdownEl.classList.add('open');
    }
    inputEl.addEventListener('input', e => {
        if (clearBtnEl) clearBtnEl.style.display = e.target.value ? 'block' : 'none';
        search(e.target.value.trim());
    });
    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (dropdownEl.classList.contains('open') && activeIdx >= 0) doSelect(filtered[activeIdx]);
            else if (filtered.length > 0) doSelect(filtered[0]);
            else { const exact = cityList.find(c => c.name === inputEl.value.trim()); if (exact) doSelect(exact); }
            e.preventDefault();
        } else if (e.key === 'ArrowDown') {
            if (!dropdownEl.classList.contains('open')) return;
            activeIdx = Math.min(activeIdx+1, filtered.length-1); render(); e.preventDefault();
        } else if (e.key === 'ArrowUp') {
            if (!dropdownEl.classList.contains('open')) return;
            activeIdx = Math.max(activeIdx-1, 0); render(); e.preventDefault();
        } else if (e.key === 'Escape') { dropdownEl.classList.remove('open'); }
    });
    inputEl.addEventListener('blur', () => {
        setTimeout(() => {
            dropdownEl.classList.remove('open');
            const val = inputEl.value.trim();
            if (val && CITIES[val] && val !== currentCity) loadCity(val);
        }, 200);
    });
    dropdownEl.addEventListener('mousedown', e => {
        const item = e.target.closest('.city-dropdown-item');
        if (item) doSelect(filtered[parseInt(item.dataset.idx)]);
    });
    function doSelect(c) {
        inputEl.value = c.name;
        dropdownEl.classList.remove('open');
        if (clearBtnEl) clearBtnEl.style.display = 'block';
        onSelect(c.name);
    }
    return { clear: () => {
        inputEl.value = ''; filtered = [];
        dropdownEl.classList.remove('open');
        if (clearBtnEl) clearBtnEl.style.display = 'none';
    }};
}

// ── WMO 天气码映射 ──────────────────────────────────────
// 挂到 window 确保全局可访问（解决 Tailwind Play CDN 语法转译问题）
window.WMO_TEXT_MAP = {
    0:'☀️ 晴',1:'🌤️ 少云',2:'⛅ 多云',3:'☁️ 阴',
    45:'🌫️ 雾',48:'🌫️ 冻雾',
    51:'🌦️ 小雨',53:'🌧️ 中雨',55:'🌧️ 大雨',
    61:'🌧️ 小雨',63:'🌧️ 中雨',65:'🌧️ 大雨',
    66:'🌧️ 冻雨',67:'🌧️ 大冻雨',
    71:'🌨️ 小雪',73:'🌨️ 中雪',75:'❄️ 大雪',
    77:'🌨️ 雪粒',
    80:'🌦️ 阵雨',81:'🌧️ 中阵雨',82:'⛈️ 大阵雨',
    85:'🌨️ 小阵雪',86:'❄️ 大阵雪',
    95:'⛈️ 雷暴',96:'⛈️ 雷暴+冰雹',99:'⛈️ 强雷暴+冰雹'
};

// ── 加载城市数据 ──────────────────────────────────────────
function loadCity(name) {
    currentCity = name;
    const cityData = WEATHER_DATA[name];
    console.log('[loadCity]', name, 'yearKeys:', yearKeys, 'd26:', cityData && cityData['26'] ? 'exists' : cityData);
    if (!cityData) { showToast('⚠️ 该城市暂无数据'); return; }

    const d = cityData[yearKeys[2]];
    if (!d || !d.time || d.time.length === 0) {
        showToast('⚠️ 今年数据尚未更新，请等待下次采集');
        return;
    }

    const today = new Date().toISOString().split('T')[0];
    const idx = d.time.findIndex(t => t === today);

    if (idx >= 0) {
        document.getElementById('k1').textContent = d.max[idx] + '°C';
        document.getElementById('k2').textContent = d.min[idx] + '°C';
        const wc = d.wc ? d.wc[idx] : null;
        document.getElementById('k3').textContent = (wc !== null && wc !== undefined) ? (window.WMO_TEXT_MAP[wc] || '?') : '--';
        // DEBUG: 直接覆盖 k3 显示调试信息（上线后删除此行）
        document.getElementById('k3').textContent = `W${wc}=${window.WMO_TEXT_MAP ? window.WMO_TEXT_MAP[wc] : 'ERR_MAP_UNDEF'}`;
        const dress = d.dress ? d.dress[idx] : null;
        document.getElementById('k4').textContent = dress || '--';
    } else {
        ['k1','k2','k3','k4'].forEach(id => document.getElementById(id).textContent = id === 'k3' ? '--' : '--°');
    }

    renderCharts(cityData);
    renderTable(cityData, today);
}

// ── 渲染图表 ─────────────────────────────────────────────
function fmtShort(d) {
    const p = d.split('-');
    return `${parseInt(p[1])}/${parseInt(p[2])}`;
}

function renderCharts(cityData) {
    const d = cityData[yearKeys[2]];
    const labels = d.time.map(fmtShort);
    const today = new Date().toISOString().split('T')[0];
    const todayIdx = d.time.findIndex(t => t === today);

    const todayAnnotation = {
        type: 'line', xMin: todayIdx, xMax: todayIdx,
        borderColor: 'rgba(248,113,113,0.8)', borderWidth: 2, borderDash: [6,4],
        label: { display:true, content:'今日', color:'#f87171', backgroundColor:'rgba(5,8,16,0.85)', font:{size:11,weight:'bold'}, position:'start', yAdjust:-10 }
    };

    const chartOpts = () => ({
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
            legend: {
                position: 'bottom',
                labels: { usePointStyle:true, pointStyleWidth:10, font:{size:12,color:'#94a3b8'}, color:'#94a3b8' },
                title: { display: false }
            },
            annotation: { annotations: { todayLine: todayAnnotation } },
            tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw}°C` } }
        },
        scales: {
            x: {
                grid: { color: 'rgba(0,180,255,0.05)', drawBorder: false },
                ticks: { font:{size:10,color:'rgba(100,116,139,0.7)'}, maxRotation:45 }
            },
            y: {
                grid: { color: 'rgba(0,180,255,0.05)', drawBorder: false },
                ticks: { callback: v=>v+'°C', font:{size:11,color:'rgba(100,116,139,0.7)'} }
            }
        }
    });

    const ds1=[], ds2=[];
    const c24=['#f87171','#fb923c'], c25=['#34d399','#6ee7b7'], c26=['#38bdf8','#818cf8'];

    if (cityData[yearKeys[0]]) {
        const d0=cityData[yearKeys[0]];
        ds1.push({label:`${currentYear-2}`,data:d0.max,borderColor:c24[0],tension:0.4,pointRadius:2,borderWidth:1.5,fill:false});
        ds2.push({label:`${currentYear-2}`,data:d0.min,borderColor:c24[1],tension:0.4,pointRadius:2,borderWidth:1.5,fill:false});
    }
    if (cityData[yearKeys[1]]) {
        const d1=cityData[yearKeys[1]];
        ds1.push({label:`${currentYear-1}`,data:d1.max,borderColor:c25[0],tension:0.4,pointRadius:2,borderWidth:1.5,fill:false});
        ds2.push({label:`${currentYear-1}`,data:d1.min,borderColor:c25[1],tension:0.4,pointRadius:2,borderWidth:1.5,fill:false});
    }
    ds1.push({label:`${currentYear}`,data:d.max,borderColor:c26[0],backgroundColor:'rgba(56,189,248,0.07)',tension:0.4,pointRadius:3,borderWidth:2.5,fill:false});
    ds2.push({label:`${currentYear}`,data:d.min,borderColor:c26[1],backgroundColor:'rgba(129,140,248,0.07)',tension:0.4,pointRadius:3,borderWidth:2.5,fill:false});

    if (ch1) ch1.destroy(); if (ch2) ch2.destroy();
    ch1 = new Chart(document.getElementById('c1'), {type:'line',data:{labels,datasets:ds1},options:chartOpts()});
    ch2 = new Chart(document.getElementById('c2'), {type:'line',data:{labels,datasets:ds2},options:chartOpts()});
}

// ── 渲染表格 ─────────────────────────────────────────────
function renderTable(cityData, today) {
    const d = cityData[yearKeys[2]];
    const tb = document.getElementById('tb');
    tb.innerHTML = '';
    d.time.forEach((t, i) => {
        const isToday = t === today;
        const isFuture = t > today;
        const d0 = cityData[yearKeys[0]], d1 = cityData[yearKeys[1]];
        const tag = isToday ? ' <span style="background:rgba(251,191,36,0.15);color:#fcd34d;padding:1px 7px;border-radius:10px;font-size:11px;border:1px solid rgba(251,191,36,0.3);">今天</span>'
               : isFuture ? ' <span style="color:rgba(100,116,139,0.35);font-size:11px;">预测</span>' : '';
        const tr = document.createElement('tr');
        tr.className = isToday ? 'today-row' : '';
        tr.innerHTML = `
            <td style="font-weight:${isToday?700:400}">${fmtShort(t)}${tag}</td>
            <td class="text-center" style="color:${isToday?'#fcd34d':'#f87171'}">${d0&&d0.max[i]!=null?d0.max[i]+'°C':'--'}</td>
            <td class="text-center" style="color:${isToday?'#fcd34d':'#93c5fd'}">${d0&&d0.min[i]!=null?d0.min[i]+'°C':'--'}</td>
            <td class="text-center" style="color:${isToday?'#fcd34d':'#34d399'}">${d1&&d1.max[i]!=null?d1.max[i]+'°C':'--'}</td>
            <td class="text-center" style="color:${isToday?'#fcd34d':'#6ee7b7'}">${d1&&d1.min[i]!=null?d1.min[i]+'°C':'--'}</td>
            <td class="text-center font-bold" style="color:${isToday?'#fcd34d':'#f87171'}">${d.max[i]!=null?d.max[i]+'°C':'--'}</td>
            <td class="text-center font-bold" style="color:${isToday?'#fcd34d':'#38bdf8'}">${d.min[i]!=null?d.min[i]+'°C':'--'}</td>`;
        tb.appendChild(tr);
    });
}

// ── 多城市对比 ───────────────────────────────────────────
function renderCmpTabs() {
    const container = document.getElementById('cmpTabs');
    const addBtn = document.getElementById('cmpAddBtn');
    Array.from(container.querySelectorAll('.cmp-tab')).forEach(el => el.remove());
    cmpCities.forEach((city, i) => {
        const tab = document.createElement('div');
        tab.className = 'cmp-tab';
        tab.innerHTML = `${city}<span class="remove" onclick="removeCmpCity(${i},event)">✕</span>`;
        container.insertBefore(tab, addBtn);
    });
    addBtn.disabled = cmpCities.length >= 5;
    addBtn.style.display = cmpCities.length >= 5 ? 'none' : 'flex';
}

function openCityPicker() {
    document.getElementById('cityPickerOverlay').classList.add('open');
    document.getElementById('pickerSearch').value = '';
    document.getElementById('pickerSearch').focus();
    renderPickerList(cityList);
}

function closeCityPicker(e) {
    if (!e || e.target.id === 'cityPickerOverlay') {
        document.getElementById('cityPickerOverlay').classList.remove('open');
    }
}

function renderPickerList(list) {
    const container = document.getElementById('pickerList');
    container.innerHTML = list.slice(0, 200).map(c =>
        `<div class="city-picker-item" onclick="selectPickerCity('${c.name}')"><span>${c.name}</span><span class="prov">${c.province}</span></div>`
    ).join('');
}

function filterPickerCities(q) {
    renderPickerList(cityList.filter(c => c.name.includes(q) || c.province.includes(q)));
}

function selectPickerCity(name) {
    if (cmpCities.includes(name)) { showToast('⚠️ 该城市已在列表中'); return; }
    if (cmpCities.length >= 5) { showToast('⚠️ 最多只能添加5个城市'); return; }
    cmpCities.push(name);
    renderCmpTabs();
    closeCityPicker();
}

function removeCmpCity(i, e) { e.stopPropagation(); cmpCities.splice(i,1); renderCmpTabs(); }

function runCompare() {
    if (cmpCities.length < 2) { showToast('⚠️ 请至少添加2个城市'); return; }
    const missing = cmpCities.filter(n => !WEATHER_DATA[n] || !WEATHER_DATA[n][yearKeys[2]]);
    if (missing.length > 0) { showToast('⚠️ 缺少数据: ' + missing.join(', ')); return; }

    const colors = ['#38bdf8','#f87171','#34d399','#fbbf24','#a78bfa'];
    const datasetsMax=[], datasetsMin=[];
    cmpCities.forEach((name, i) => {
        const d = WEATHER_DATA[name][yearKeys[2]];
        const c = colors[i % colors.length];
        datasetsMax.push({label:name,data:d.max,borderColor:c,backgroundColor:c+'14',tension:0.4,pointRadius:3,borderWidth:2.5,fill:false});
        datasetsMin.push({label:name,data:d.min,borderColor:c,backgroundColor:c+'14',tension:0.4,pointRadius:3,borderWidth:2.5,fill:false});
    });

    const refData = WEATHER_DATA[cmpCities[0]][yearKeys[2]];
    const today = new Date().toISOString().split('T')[0];
    const todayIdx = refData.time.findIndex(t => t === today);
    const todayAnnotation = {
        type:'line', xMin:todayIdx, xMax:todayIdx,
        borderColor:'rgba(248,113,113,0.8)', borderWidth:2, borderDash:[6,4],
        label:{display:true,content:'今日',color:'#f87171',backgroundColor:'rgba(5,8,16,0.85)',font:{size:11,weight:'bold'},position:'start'}
    };
    const chartOpts = () => ({
        responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
        plugins: {
            legend:{position:'bottom',labels:{usePointStyle:true,font:{size:12},color:'#94a3b8'}},
            tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.raw}°C`}},
            annotation:{annotations:{todayLine:todayAnnotation}}
        },
        scales: {
            x:{grid:{color:'rgba(0,180,255,0.05)',drawBorder:false},ticks:{font:{size:10,color:'rgba(100,116,139,0.7)'}}},
            y:{grid:{color:'rgba(0,180,255,0.05)',drawBorder:false},ticks:{callback:v=>v+'°C',font:{size:11,color:'rgba(100,116,139,0.7)'}}}
        }
    });

    document.getElementById('cmpEmpty').style.display = 'none';
    document.getElementById('cmpChartsArea').style.display = 'block';
    if (ch3) ch3.destroy(); if (ch4) ch4.destroy();
    ch3 = new Chart(document.getElementById('c3'), {type:'line',data:{labels:refData.time.map(fmtShort),datasets:datasetsMax},options:chartOpts()});
    ch4 = new Chart(document.getElementById('c4'), {type:'line',data:{labels:refData.time.map(fmtShort),datasets:datasetsMin},options:chartOpts()});
}

// ── 表格折叠 ─────────────────────────────────────────────
function toggleTable() {
    tableCollapsed = !tableCollapsed;
    document.getElementById('tableSection').style.display = tableCollapsed ? 'none' : 'block';
    document.getElementById('tableToggleText').textContent = tableCollapsed ? '展开' : '隐藏';
}

// ── 截图分享 ─────────────────────────────────────────────
async function takeScreenshot() {
    const btn = document.querySelector('.btn-screenshot');
    btn.textContent = '⏳...'; btn.disabled = true;
    const wasCollapsed = tableCollapsed;
    if (!tableCollapsed) toggleTable();
    try {
        await new Promise(r => setTimeout(r, 300));
        const canvas = await html2canvas(document.getElementById('dashboard'), {
            scale: 2, useCORS:true, backgroundColor:'#050810', logging:false,
            ignoreElements: el => el.id === 'cityPickerOverlay'
        });
        canvas.toBlob(async (blob) => {
            let saved = false;
            try {
                await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
                showToast('✓ 已复制到剪贴板');
                saved = true;
            } catch(e) {}
            if (!saved) {
                const url = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = url;
                a.download = `weather_hud_${currentCity||'nocity'}_${new Date().toLocaleDateString('en-US')}.png`;
                a.click();
                showToast('✓ 图片已保存');
            }
        });
    } catch(err) { showToast('✗ 截图失败，请重试'); }
    if (!wasCollapsed) toggleTable();
    btn.innerHTML = '📸 截图'; btn.disabled = false;
}

function showToast(msg) {
    const t = document.getElementById('screenshotToast');
    t.textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>
