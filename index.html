<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气数据看板 · WEATHER HUD</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="data.js"></script>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: #0c1018;
        min-height: 100vh;
        color: #a0b4cc;
        overflow-x: hidden;
    }

    /* ── 深色渐变光晕背景（无网格） ─────────── */
    body::before {
        content: '';
        position: fixed; inset: 0; z-index: 0; pointer-events: none;
        background:
            radial-gradient(ellipse 80% 50% at 50% 10%, rgba(20,50,80,0.35) 0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 90% 85%, rgba(15,40,65,0.2) 0%, transparent 50%),
            radial-gradient(ellipse 40% 30% at 10% 70%, rgba(10,30,50,0.15) 0%, transparent 50%);
    }

    #dashboard { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

    /* ── HUD 面板通用 ─────────────────────── */
    .hud-panel {
        background: rgba(14,22,35,0.92);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(60,100,140,0.15);
        border-radius: 10px;
        box-shadow:
            0 0 1px rgba(80,140,200,0.2),
            0 4px 24px rgba(0,0,0,0.5),
            inset 0 1px 0 rgba(80,140,200,0.05);
        position: relative;
    }
    .hud-panel::before {
        content: '';
        position: absolute; top: 0; left: 20px; right: 20px; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(60,120,170,0.2), transparent);
    }

    /* ── Header 面板 ──────────────────────── */
    .header-panel {
        padding: 18px 24px;
        margin-bottom: 16px;
    }
    .header-top {
        display: flex; align-items: center; justify-content: space-between;
        flex-wrap: wrap; gap: 14px; margin-bottom: 14px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .hud-title {
        font-size: 18px; font-weight: 800;
        letter-spacing: 3px; color: #8ab0d0;
        text-shadow: 0 0 12px rgba(80,140,200,0.2);
    }
    .hud-sub {
        font-size: 11px; color: rgba(120,150,180,0.5);
        letter-spacing: 1px; margin-top: 3px;
    }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .city-input {
        width: 170px; padding: 7px 12px; border-radius: 6px;
        border: 1px solid rgba(60,100,140,0.2);
        background: rgba(0,0,0,0.3);
        color: #a0b4cc; font-size: 13px; outline: none;
        transition: border-color 0.2s;
    }
    .city-input:focus { border-color: rgba(60,120,170,0.4); }
    .city-input::placeholder { color: rgba(120,150,180,0.35); }

    /* 圆形按钮 */
    .circle-btn {
        width: 38px; height: 38px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; transition: all 0.25s; flex-shrink: 0;
    }
    .circle-btn-cyan {
        background: rgba(40,100,150,0.12);
        border: 1.5px solid rgba(60,130,180,0.35);
        box-shadow: 0 0 8px rgba(40,100,150,0.15);
        color: #5a9ec0;
    }
    .circle-btn-cyan:hover {
        background: rgba(40,100,150,0.22);
        border-color: rgba(60,130,180,0.55);
        box-shadow: 0 0 14px rgba(40,100,150,0.3);
        transform: scale(1.06);
    }
    .circle-btn-yellow {
        background: rgba(150,120,40,0.1);
        border: 1.5px solid rgba(170,140,50,0.3);
        box-shadow: 0 0 8px rgba(150,120,40,0.1);
        color: #b09830;
    }
    .circle-btn-yellow:hover {
        background: rgba(150,120,40,0.2);
        border-color: rgba(170,140,50,0.5);
        box-shadow: 0 0 14px rgba(150,120,40,0.25);
        transform: scale(1.06);
    }

    /* 城市标签 */
    .city-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 6px;
        transition: all 0.3s;
        overflow: hidden;
    }
    #cityBar.hidden {
        display: none;
    }
    .city-grid.expanded {
        max-height: 200px; /* 两行高度，足够显示 */
    }
    #cityArrow {
        transform: rotate(0deg);
    }
    .city-tag {
        padding: 6px 0; text-align: center; border-radius: 5px;
        background: rgba(30,50,70,0.3);
        border: 1px solid rgba(60,100,140,0.1);
        color: rgba(120,150,180,0.55); font-size: 12px; cursor: pointer;
        transition: all 0.2s; letter-spacing: 2px;
    }
    .city-tag:hover {
        background: rgba(35,60,85,0.4);
        border-color: rgba(60,100,140,0.25);
        color: #7aa0c0;
    }
    .city-tag.active {
        background: rgba(40,80,120,0.25);
        border-color: rgba(60,120,170,0.4);
        color: #6aaad0;
        box-shadow: 0 0 8px rgba(40,100,150,0.15);
        font-weight: 600;
    }

    /* ── 板块标题栏 ──────────────────────── */
    .panel-header {
        display: flex; align-items: center; justify-content: space-between;
        margin-bottom: 14px;
    }
    .panel-header-left { display: flex; align-items: center; gap: 10px; }
    .hud-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    .hud-dot { animation: pulse-dot 2.5s ease-in-out infinite; }
    .dot-green  { background: #3a8a5a; box-shadow: 0 0 5px rgba(58,138,90,0.5); }
    .dot-amber  { background: #a08828; box-shadow: 0 0 5px rgba(160,136,40,0.5); }
    .panel-title {
        font-size: 13px; font-weight: 700;
        color: #7aa0c0; letter-spacing: 1px;
    }
    .panel-sub {
        font-size: 10px; color: rgba(120,150,180,0.45);
        letter-spacing: 0.5px; margin-top: 2px;
    }
    .collapse-btn {
        padding: 4px 10px; border-radius: 5px;
        background: rgba(30,50,70,0.25);
        border: 1px solid rgba(60,100,140,0.12);
        color: rgba(120,150,180,0.5);
        cursor: pointer; font-size: 11px;
        display: flex; align-items: center; gap: 4px; transition: all 0.15s;
    }
    .collapse-btn:hover { background: rgba(35,60,85,0.35); border-color: rgba(60,100,140,0.25); color: #7aa0c0; }

    /* ── KPI 卡片 ────────────────────────── */
    .kpi-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .kpi-card {
        background: rgba(12,20,32,0.6);
        border: 1px solid rgba(60,100,140,0.08);
        border-radius: 8px;
        padding: 14px;
        position: relative; overflow: hidden;
        transition: all 0.25s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 90px;
    }
    .kpi-card:hover {
        transform: translateY(-1px);
        border-color: rgba(60,100,140,0.2);
        box-shadow: 0 6px 18px rgba(0,0,0,0.3);
    }
    .kpi-value { font-size: 32px; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
    .kpi-label {
        font-size: 9px; color: rgba(120,150,180,0.5);
        letter-spacing: 0.5px; margin-top: 6px; text-align: center;
    }
    .kpi-hint { font-size: 9px; color: rgba(120,150,180,0.35); margin-top: 3px; letter-spacing: 0.5px; text-align: center; }
    .kpi-icon { display: none; }
    .kpi-red    .kpi-value { color: #b86050; }
    .kpi-blue   .kpi-value { color: #4a90b8; }
    .kpi-green  .kpi-value { color: #3a9a62; }
    .kpi-purple .kpi-value { color: #8068b0; }
    .kpi-red    .kpi-icon { color: #b86050; }
    .kpi-blue   .kpi-icon { color: #4a90b8; }
    .kpi-green  .kpi-icon { color: #3a9a62; }
    .kpi-purple .kpi-icon { color: #8068b0; }

    /* ── 天气日历 ────────────────────────── */
    .weather-calendar { overflow-x: auto; }
    .weather-calendar::-webkit-scrollbar { height: 3px; }
    .weather-calendar::-webkit-scrollbar-thumb { background: rgba(60,100,140,0.15); border-radius: 3px; }
    .wc-table {
        width: 100%; min-width: 880px;
        border-collapse: separate; border-spacing: 2px;
        table-layout: fixed;
    }
    .wc-table th {
        padding: 7px 0; text-align: center;
        font-size: 11px; color: rgba(120,150,180,0.5);
        letter-spacing: 0.5px; font-weight: 600;
    }
    .wc-table td { text-align: center; }
    .wc-table th.today-col {
        color: #b09830;
        background: rgba(160,136,40,0.05);
        border-radius: 5px 5px 0 0;
        border-bottom: 1.5px solid rgba(160,136,40,0.25);
    }
    .wc-table th.future-col { color: rgba(80,120,150,0.45); }
    .wc-row-year {
        padding: 5px 8px; font-size: 11px; font-weight: 700;
        white-space: nowrap; text-align: center; vertical-align: middle;
        letter-spacing: 0.5px;
    }
    .wc-cell {
        padding: 7px 2px; text-align: center; vertical-align: middle;
        border-radius: 5px; transition: all 0.2s;
        background: rgba(10,18,30,0.5);
        border: 1px solid rgba(60,100,140,0.05);
    }
    .wc-cell:hover { border-color: rgba(60,100,140,0.15); background: rgba(14,25,40,0.6); }
    .wc-cell.today-cell {
        background: rgba(160,136,40,0.04);
        border: 1px solid rgba(160,136,40,0.18);
        box-shadow: 0 0 8px rgba(160,136,40,0.05);
    }
    .wc-cell.future-cell { border-style: dashed; border-color: rgba(60,100,140,0.05); }
    .wc-emoji { font-size: 18px; line-height: 1.2; }
    .wc-text { font-size: 9px; color: rgba(120,150,180,0.45); margin-top: 1px; }
    .wc-temp { font-size: 10px; font-weight: 700; margin-top: 3px; display: flex; justify-content: center; gap: 4px; }
    .wc-temp-high { color: #a86858; }
    .wc-temp-low { color: #4a88a8; }
    .wc-y24 { color: #a86858; background: rgba(160,80,60,0.05); border-radius: 5px; }
    .wc-y25 { color: #3a9a62; background: rgba(45,120,75,0.05); border-radius: 5px; }
    .wc-y26 { color: #4a90b8; background: rgba(50,100,140,0.06); border-radius: 5px; border: 1px solid rgba(60,120,170,0.15); }

    /* 天气结论条 */
    .forecast-summary {
        display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
        padding: 7px 12px; margin-bottom: 12px;
        background: rgba(16,28,45,0.5);
        border: 1px solid rgba(60,100,140,0.06);
        border-radius: 6px;
        font-size: 11px; color: rgba(120,150,180,0.5);
    }
    .fs-item { display: flex; align-items: center; gap: 4px; }
    .fs-item .fs-emoji { font-size: 13px; }
    .fs-item .fs-val { font-weight: 700; color: #8ab0d0; }
    .fs-meta { margin-left: auto; color: rgba(90,120,150,0.35); font-size: 10px; }

    /* ── 搜索下拉 ────────────────────────── */
    .city-dropdown {
        position: absolute; top: calc(100% + 6px); left: 0; right: 0;
        background: rgba(14,22,35,0.97);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(60,100,140,0.2);
        border-radius: 10px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5), 0 0 15px rgba(60,100,140,0.05);
        max-height: 260px; overflow-y: auto; z-index: 9999; display: none;
    }
    .city-dropdown.open { display: block; }
    .city-dropdown-item {
        padding: 9px 14px; font-size: 13px; cursor: pointer;
        color: rgba(120,150,180,0.7); transition: all 0.15s;
        border-bottom: 1px solid rgba(60,100,140,0.05);
    }
    .city-dropdown-item:hover {
        background: rgba(35,60,85,0.35);
        color: #7aa0c0;
    }
    .city-dropdown-item .prov { font-size: 11px; color: rgba(100,130,160,0.4); margin-left: 6px; }

    /* ── 城市选择对话框 ──────────────────── */
    .city-dialog-overlay {
        position: fixed; inset: 0; z-index: 100;
        background: rgba(0,0,0,0.6);
        backdrop-filter: blur(4px);
        display: none; align-items: center; justify-content: center;
    }
    .city-dialog-overlay.open { display: flex; }
    .city-dialog-modal {
        width: 420px; max-height: 460px;
        background: rgba(14,22,35,0.98);
        border: 1px solid rgba(60,100,140,0.2);
        border-radius: 12px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        overflow: hidden;
        display: flex; flex-direction: column;
    }

    /* ── Toast ───────────────────────────── */
    .toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: rgba(14,22,35,0.97);
        border: 1px solid rgba(60,100,140,0.2);
        color: #7aa0c0; padding: 12px 24px; border-radius: 10px;
        font-size: 13px; z-index: 10001;
        box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 15px rgba(60,100,140,0.1);
        letter-spacing: 0.5px; display: none;
    }
    .toast.show { display: block; }

    /* ── 滚动条 ──────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(60,100,140,0.12); border-radius: 3px; }

    /* ── 响应式 ──────────────────────────── */
    @media (max-width: 640px) {
        .city-input { width: 140px; }
        .kpi-grid { grid-template-columns: repeat(2, 1fr); }
        .city-grid { grid-template-columns: repeat(4, 1fr); }
    }
    </style>
</head>
<body>
<div id="dashboard">

    <!-- ══ 第一板块：Header ════════════════════════ -->
    <div class="hud-panel header-panel">
        <div class="header-top">
            <div class="header-left">
                <svg width="40" height="40" viewBox="0 0 44 44" fill="none">
                    <circle cx="22" cy="22" r="20" stroke="rgba(70,120,170,0.2)" stroke-width="1"/>
                    <circle cx="22" cy="22" r="13" stroke="rgba(70,120,170,0.12)" stroke-width="1"/>
                    <circle cx="22" cy="22" r="6" stroke="rgba(70,120,170,0.25)" stroke-width="1"/>
                    <line x1="22" y1="22" x2="38" y2="10" stroke="#5a9ec0" stroke-width="1.2" stroke-linecap="round">
                        <animateTransform attributeName="transform" type="rotate" from="0 22 22" to="360 22 22" dur="4s" repeatCount="indefinite"/>
                    </line>
                    <circle cx="22" cy="22" r="2" fill="#5a9ec0"/>
                </svg>
                <div>
                    <div class="hud-title">天气数据看板</div>
                    <div class="hud-sub" id="dataStatusHint">加载中...</div>
                </div>
            </div>
            <div class="header-right">
                <span style="color:rgba(120,150,180,0.6);font-size:11px;letter-spacing:0.5px;margin-right:6px;">城市快速入口</span>
                <button class="collapse-btn" id="cityCollapseBtn" onclick="toggleCityGrid()" title="折叠城市标签" style="margin-right:8px;">
                    <span id="cityArrow" style="display:inline-flex;transition:transform 0.3s;">▲</span>
                    <span id="cityCollapseText" style="white-space:nowrap;">收起</span>
                </button>
                <div style="position:relative;">
                    <input class="city-input" type="text" id="mainCityInput" placeholder="搜索城市..." autocomplete="off" />
                    <div class="city-dropdown" id="mainCityDropdown"></div>
                </div>
                <div class="circle-btn circle-btn-cyan" title="刷新数据" onclick="reloadCity()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                </div>
                <div class="circle-btn circle-btn-yellow" title="导出截图" onclick="takeScreenshot()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </div>
            </div>
        </div>
        <!-- 城市标签栏 -->
        <div id="cityBar">
            <div class="city-grid" id="cityGrid">
                <!-- 由 JS 渲染 -->
            </div>
        </div>
    </div>

    <!-- ══ 第二板块：今日天气概况 ═════════════ -->
    <div class="hud-panel" style="padding:18px 24px;margin-bottom:16px;">
        <div class="panel-header">
            <div class="panel-header-left">
                <span class="hud-dot dot-green"></span>
                <div>
                    <div class="panel-title">今日天气概况 · <span style="color:#6aaad0;" id="kpiCityName">--</span></div>
                    <div class="panel-sub" id="kpiDateHint">--</div>
                </div>
            </div>
            <button class="collapse-btn" onclick="toggleSection('kpiBody','kpiArrow','kpiText')">
                <span id="kpiArrow" style="display:inline-flex;transition:transform 0.3s;">▼</span>
                <span id="kpiText" style="white-space:nowrap;">收起</span>
            </button>
        </div>
        <div id="kpiBody" style="transition:all 0.3s;">
            <div class="kpi-grid">
                <div class="kpi-card kpi-red">
                    <div class="kpi-label">最高气温</div>
                    <div class="kpi-value" id="k1">--°C</div>
                    <div class="kpi-hint" id="k1hint"></div>
                </div>
                <div class="kpi-card kpi-blue">
                    <div class="kpi-label">最低气温</div>
                    <div class="kpi-value" id="k2">--°C</div>
                    <div class="kpi-hint" id="k2hint"></div>
                </div>
                <div class="kpi-card kpi-green">
                    <div class="kpi-label">天气状况</div>
                    <div class="kpi-value" id="k3">--</div>
                    <div class="kpi-hint">实时天气</div>
                </div>
                <div class="kpi-card kpi-purple">
                    <div class="kpi-label">最大风速</div>
                    <div class="kpi-value" id="k4">--</div>
                    <div class="kpi-hint">km/h</div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ 第三板块：未来15天天气状况（三年对比） ═══ -->
    <div class="hud-panel" style="padding:18px 24px;margin-bottom:16px;background:#171e2c;">
        <div class="panel-header">
            <div class="panel-header-left">
                <span class="hud-dot dot-amber"></span>
                <div>
                    <div class="panel-title">未来天气概况 · 三年对比</div>
                    <div class="panel-sub" id="forecastSummary">选择城市后显示天气概况</div>
                </div>
            </div>
            <button class="collapse-btn" onclick="toggleSection('fcBody','fcArrow','fcText')">
                <span id="fcArrow" style="display:inline-flex;transition:transform 0.3s;">▼</span>
                <span id="fcText" style="white-space:nowrap;">收起</span>
            </button>
        </div>
        <div id="fcBody" style="transition:all 0.3s;">
            <div id="forecastContent" style="display:none;"></div>
        </div>
    </div>

    <!-- ══ 第四板块：最高气温对比 · 三年（±15天） ═══ -->
    <div class="hud-panel" style="padding:18px 24px;margin-bottom:16px;">
        <div class="panel-header">
            <div class="panel-header-left">
                <span class="hud-dot" style="background:#a86858;box-shadow:0 0 5px rgba(168,104,88,0.5);"></span>
                <div>
                    <div class="panel-title">最高气温对比 · 三年</div>
                    <div class="panel-sub" id="maxChartSummary">选择城市后显示气温趋势</div>
                </div>
            </div>
            <button class="collapse-btn" onclick="toggleSection('maxChartBody','maxChartArrow','maxChartText')">
                <span id="maxChartArrow" style="display:inline-flex;transition:transform 0.3s;">▼</span>
                <span id="maxChartText" style="white-space:nowrap;">收起</span>
            </button>
        </div>
        <div id="maxChartBody" style="transition:all 0.3s;">
            <div style="height:260px;position:relative;">
                <canvas id="maxTempChart"></canvas>
            </div>
        </div>
    </div>

    <!-- ══ 第五板块：最低气温对比 · 三年（±15天） ═══ -->
    <div class="hud-panel" style="padding:18px 24px;margin-bottom:16px;">
        <div class="panel-header">
            <div class="panel-header-left">
                <span class="hud-dot" style="background:#4a88a8;box-shadow:0 0 5px rgba(74,136,168,0.5);"></span>
                <div>
                    <div class="panel-title">最低气温对比 · 三年</div>

<script>
// ═══════════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════════
var chMax, chMin, chDiff;
var currentCity = null;
var cityList = [];
var currentYear = new Date().getFullYear();
var yearKeys = [String((currentYear-2)%100), String((currentYear-1)%100), String(currentYear%100)];

// Header 快捷城市列表
var quickCities = ['北京','上海','广州','深圳','沈阳','哈尔滨','郑州','青岛','杭州','西安','成都','武汉'];

// 配色
var COLORS = {
    blue:   '#4a90b8',
    green:  '#3a9a62',
    red:    '#a86858',
    purple: '#8068b0'
};

// ═══════════════════════════════════════════════════
// WMO 天气码映射
// ═══════════════════════════════════════════════════
var WMO_EMOJI = {
    0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',
    51:'🌦️',53:'🌧️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',
    66:'🌧️',67:'🌧️',71:'🌨️',73:'🌨️',75:'❄️',77:'🌨️',
    80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'❄️',
    95:'⛈️',96:'⛈️',99:'⛈️'
};
var WMO_SHORT = {
    0:'晴',1:'少云',2:'多云',3:'阴',45:'雾',48:'冻雾',
    51:'小雨',53:'中雨',55:'大雨',61:'小雨',63:'中雨',65:'大雨',
    66:'冻雨',67:'大冻雨',71:'小雪',73:'中雪',75:'大雪',77:'雪粒',
    80:'阵雨',81:'中阵雨',82:'大阵雨',85:'小阵雪',86:'大阵雪',
    95:'雷暴',96:'雷暴冰雹',99:'强雷暴'
};
var WMO_TEXT = {
    0:'☀️ 晴',1:'🌤️ 少云',2:'⛅ 多云',3:'☁️ 阴',45:'🌫️ 雾',48:'🌫️ 冻雾',
    51:'🌦️ 小雨',53:'🌧️ 中雨',55:'🌧️ 大雨',61:'🌧️ 小雨',63:'🌧️ 中雨',65:'🌧️ 大雨',
    66:'🌧️ 冻雨',67:'🌧️ 大冻雨',71:'🌨️ 小雪',73:'🌨️ 中雪',75:'❄️ 大雪',77:'🌨️ 雪粒',
    80:'🌦️ 阵雨',81:'🌧️ 中阵雨',82:'⛈️ 大阵雨',85:'🌨️ 小阵雪',86:'❄️ 大阵雪',
    95:'⛈️ 雷暴',96:'⛈️ 雷暴冰雹',99:'⛈️ 强雷暴'
};

function getWmoEmoji(c) { return WMO_EMOJI[c] || '❓'; }
function getWmoShort(c) { return WMO_SHORT[c] || '?'; }
function getWmoText(c) { return WMO_TEXT[c] || '未知('+c+')'; }
function isGoodWeather(c) { return [0,1,2].indexOf(c) >= 0; }
function isRain(c) { return [51,53,55,61,63,65,66,67,80,81,82].indexOf(c) >= 0; }
function isSnow(c) { return [71,73,75,77,85,86].indexOf(c) >= 0; }

// ═══════════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════════
function fmtShort(d) {
    var p = d.split('-');
    return parseInt(p[1]) + '/' + parseInt(p[2]);
}

// 提取 MM-DD（去掉年份），用于跨年份日期对齐
function mmdd(isoDate) {
    return isoDate.substring(5); // "2024-04-29" → "04-29"
}

// 在某年数据中，按 MM-DD 查找对应日期的索引；找不到返回 -1
function findDateByMMDD(data, mmddStr) {
    if (!data || !data.time) return -1;
    for (var i = 0; i < data.time.length; i++) {
        if (data.time[i].substring(5) === mmddStr) return i;
    }
    return -1;
}

// 给定当年数据中的日期范围 [refStart, refEnd)（索引），
// 返回另一个年份数据中对应 MM-DD 日期的 { startIdx, endIdx, values: [v or null...] }
function alignByDate(refData, targetData, refStart, refEnd, field) {
    var result = [];
    for (var i = refStart; i < refEnd; i++) {
        var md = refData.time[i].substring(5); // "04-29"
        var idx = findDateByMMDD(targetData, md);
        if (idx >= 0) {
            result.push(targetData[field][idx]);
        } else {
            result.push(null);
        }
    }
    return result;
}

// 同 alignByDate 但返回整个 record { time, max, min, wc, ws, dress } 各字段对齐
function alignRecord(refData, targetData, refStart, refEnd) {
    var result = { max: [], min: [], wc: [], ws: [], dress: [] };
    for (var i = refStart; i < refEnd; i++) {
        var md = refData.time[i].substring(5);
        var idx = findDateByMMDD(targetData, md);
        if (idx >= 0) {
            result.max.push(targetData.max[idx]);
            result.min.push(targetData.min[idx]);
            result.wc.push(targetData.wc ? targetData.wc[idx] : null);
            result.ws.push(targetData.ws ? targetData.ws[idx] : null);
            result.dress.push(targetData.dress ? targetData.dress[idx] : null);
        } else {
            result.max.push(null);
            result.min.push(null);
            result.wc.push(null);
            result.ws.push(null);
            result.dress.push(null);
        }
    }
    return result;
}

function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
}

function toggleSection(bodyId, arrowId, textId) {
    var body = document.getElementById(bodyId);
    var arrow = document.getElementById(arrowId);
    var text = document.getElementById(textId);
    if (body.style.display === 'none') {
        body.style.display = '';
        arrow.style.transform = 'rotate(0deg)';
        text.textContent = '收起';
    } else {
        body.style.display = 'none';
        arrow.style.transform = 'rotate(-90deg)';
        text.textContent = '展开';
    }
}

// ═══════════════════════════════════════════════════
// 初始化
// ═══════════════════════════════════════════════════
(function init() {
    if (typeof CITIES === 'undefined' || typeof WEATHER_DATA === 'undefined') {
        document.getElementById('dataStatusHint').textContent = '● DATA LOAD FAILED';
        return;
    }

    // 数据状态
    var dataDate = DATA_DATE || '未知';
    document.getElementById('dataStatusHint').textContent = '数据更新：' + dataDate;

    // 城市列表
    cityList = Object.keys(CITIES).map(function(name) { return { name: name, province: CITIES[name].province }; });

    // 渲染 Header 快捷城市
    renderCityGrid();

    // 初始化搜索框
    initMainSearch();

    // 默认加载第一个城市
    var firstCity = Object.keys(WEATHER_DATA)[0];
    loadCity(firstCity);
})();

// ═══════════════════════════════════════════════════
// Header 城市快捷标签
// ═══════════════════════════════════════════════════
function renderCityGrid() {
    var grid = document.getElementById('cityGrid');
    grid.innerHTML = '';
    quickCities.forEach(function(name) {
        if (!CITIES[name]) return;
        var tag = document.createElement('div');
        tag.className = 'city-tag' + (name === currentCity ? ' active' : '');
        tag.textContent = name;
        tag.onclick = function() { loadCity(name); };
        grid.appendChild(tag);
    });
}

function toggleCityGrid() {
    var bar = document.getElementById('cityBar');
    var arrow = document.getElementById('cityArrow');
    var text = document.getElementById('cityCollapseText');
    if (bar.classList.contains('hidden')) {
        bar.classList.remove('hidden');
        arrow.style.transform = '';
        text.textContent = '收起';
    } else {
        bar.classList.add('hidden');
        arrow.style.transform = 'rotate(180deg)';
        text.textContent = '展开';
    }
}

// ═══════════════════════════════════════════════════
// 主城市搜索
// ═══════════════════════════════════════════════════
function initMainSearch() {
    var inp = document.getElementById('mainCityInput');
    var drop = document.getElementById('mainCityDropdown');
    var filtered = [];
    var activeIdx = -1;

    function search(q) {
        if (!q) { filtered = []; drop.classList.remove('open'); return; }
        filtered = cityList.filter(function(c) { return c.name.indexOf(q) >= 0 || c.province.indexOf(q) >= 0; }).slice(0, 50);
        activeIdx = -1;
        render();
    }
    function render() {
        if (filtered.length === 0) { drop.classList.remove('open'); return; }
        drop.innerHTML = filtered.map(function(c, i) {
            return '<div class="city-dropdown-item' + (i === activeIdx ? ' active' : '') + '" data-idx="' + i + '">' + c.name + '<span class="prov">' + c.province + '</span></div>';
        }).join('');
        drop.classList.add('open');
    }
    function doSelect(c) {
        inp.value = c.name;
        drop.classList.remove('open');
        loadCity(c.name);
    }

    inp.addEventListener('input', function(e) { search(e.target.value.trim()); });
    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            if (drop.classList.contains('open') && activeIdx >= 0) doSelect(filtered[activeIdx]);
            else if (filtered.length > 0) doSelect(filtered[0]);
            else { var exact = cityList.find(function(c) { return c.name === inp.value.trim(); }); if (exact) doSelect(exact); }
            e.preventDefault();
        } else if (e.key === 'ArrowDown') {
            if (!drop.classList.contains('open')) return;
            activeIdx = Math.min(activeIdx+1, filtered.length-1); render(); e.preventDefault();
        } else if (e.key === 'ArrowUp') {
            if (!drop.classList.contains('open')) return;
            activeIdx = Math.max(activeIdx-1, 0); render(); e.preventDefault();
        } else if (e.key === 'Escape') { drop.classList.remove('open'); }
    });
    inp.addEventListener('blur', function() {
        setTimeout(function() {
            drop.classList.remove('open');
            var val = inp.value.trim();
            if (val && CITIES[val] && val !== currentCity) loadCity(val);
        }, 200);
    });
    drop.addEventListener('mousedown', function(e) {
        var item = e.target.closest('.city-dropdown-item');
        if (item) doSelect(filtered[parseInt(item.dataset.idx)]);
    });
}

function reloadCity() {
    var val = document.getElementById('mainCityInput').value.trim();
    if (val && CITIES[val]) loadCity(val);
}

// ═══════════════════════════════════════════════════
// 加载城市数据（核心调度函数）
// ═══════════════════════════════════════════════════
function loadCity(name) {
    currentCity = name;
    var cityData = WEATHER_DATA[name];
    if (!cityData) { showToast('⚠️ 该城市暂无数据'); return; }

    var d = cityData[yearKeys[2]];
    if (!d || !d.time || d.time.length === 0) {
        showToast('⚠️ 今年数据尚未更新，请等待下次采集');
        return;
    }

    // 更新搜索框
    document.getElementById('mainCityInput').value = name;

    // 更新 Header 快捷标签
    renderCityGrid();

    // 计算 today
    var today = new Date().toISOString().split('T')[0];
    var idx = d.time.indexOf(today);
    if (idx < 0) { today = d.time[d.time.length - 1]; idx = d.time.length - 1; }

    // 更新 KPI
    document.getElementById('kpiCityName').textContent = name;
    var weekDays = ['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('kpiDateHint').textContent = today + ' ' + weekDays[new Date(today).getDay()];

    document.getElementById('k1').textContent = Math.round(d.max[idx]) + '°C';
    document.getElementById('k2').textContent = Math.round(d.min[idx]) + '°C';
    var wc = d.wc ? d.wc[idx] : null;
    document.getElementById('k3').textContent = wc != null ? getWmoText(wc) : '--';
    var ws = d.ws ? d.ws[idx] : null;
    document.getElementById('k4').textContent = ws != null ? Math.round(ws) : '--';

    // 昨日温差
    if (idx > 0) {
        var dMaxDiff = Math.round(d.max[idx] - d.max[idx-1]);
        var dMinDiff = Math.round(d.min[idx] - d.min[idx-1]);
        document.getElementById('k1hint').innerHTML = '较昨日 <span style="color:' + (dMaxDiff >= 0 ? '#3a9a62' : '#a86858') + ';">' + (dMaxDiff >= 0 ? '+' : '') + dMaxDiff + '°</span>';
        document.getElementById('k2hint').innerHTML = '较昨日 <span style="color:' + (dMinDiff >= 0 ? '#3a9a62' : '#a86858') + ';">' + (dMinDiff >= 0 ? '+' : '') + dMinDiff + '°</span>';
    } else {
        document.getElementById('k1hint').textContent = '';
        document.getElementById('k2hint').textContent = '';
    }

    // 渲染各模块
    renderWeatherCalendar(cityData, today);
    renderMaxTempChart(cityData, today);
    renderMinTempChart(cityData, today);
    renderDiffTempChart(cityData, today);
}

// ═══════════════════════════════════════════════════
// 天气日历（未来15天 · 三年对比）
// ═══════════════════════════════════════════════════
function renderWeatherCalendar(cityData, today) {
    var container = document.getElementById('forecastContent');
    container.style.display = 'block';

    var d26 = cityData[yearKeys[2]];
    var d25 = cityData[yearKeys[1]];
    var d24 = cityData[yearKeys[0]];

    var todayIdx = d26.time.indexOf(today);
    if (todayIdx < 0) {
        container.innerHTML = '<div style="text-align:center;padding:30px;color:rgba(100,116,139,0.5);">无法定位今日数据</div>';
        return;
    }

    var startIdx = todayIdx;
    var endIdx = Math.min(todayIdx + 16, d26.time.length);

    // 按月/日对齐 2025、2024 数据
    var aligned25 = d25 ? alignRecord(d26, d25, startIdx, endIdx) : null;
    var aligned24 = d24 ? alignRecord(d26, d24, startIdx, endIdx) : null;

    // 天气小结
    var futureWc = d26.wc ? d26.wc.slice(startIdx, endIdx) : [];
    var goodDays = futureWc.filter(isGoodWeather).length;
    var rainDays = futureWc.filter(isRain).length;
    var snowDays = futureWc.filter(isSnow).length;
    var overcastDays = futureWc.filter(function(c) { return c === 3; }).length;

    var summaryHtml = '<div class="forecast-summary">';
    summaryHtml += '<div class="fs-item"><span class="fs-emoji">☀️</span><span>晴好</span><span class="fs-val">' + goodDays + '天</span></div>';
    if (rainDays > 0) summaryHtml += '<div class="fs-item"><span class="fs-emoji">🌧️</span><span>有雨</span><span class="fs-val">' + rainDays + '天</span></div>';
    if (snowDays > 0) summaryHtml += '<div class="fs-item"><span class="fs-emoji">❄️</span><span>有雪</span><span class="fs-val">' + snowDays + '天</span></div>';
    if (overcastDays > 0) summaryHtml += '<div class="fs-item"><span class="fs-emoji">☁️</span><span>阴天</span><span class="fs-val">' + overcastDays + '天</span></div>';
    summaryHtml += '<span class="fs-meta">' + currentYear + '年 · ' + (currentCity || '') + '</span>';
    summaryHtml += '</div>';
    document.getElementById('forecastSummary').innerHTML = summaryHtml;

    // 日历表格 - 构建对齐后的年份数据结构
    var years = [
        { key: yearKeys[0], label: String(currentYear-2), data: aligned24, cssClass: 'wc-y24' },
        { key: yearKeys[1], label: String(currentYear-1), data: aligned25, cssClass: 'wc-y25' },
        { key: yearKeys[2], label: String(currentYear), data: null, cssClass: 'wc-y26' },
    ];

    var html = '<div class="forecast-summary">';
    html += '<div class="fs-item"><span class="fs-emoji">☀️</span><span>晴好</span><span class="fs-val">' + goodDays + '天</span></div>';
    if (rainDays > 0) html += '<div class="fs-item"><span class="fs-emoji">🌧️</span><span>有雨</span><span class="fs-val">' + rainDays + '天</span></div>';
    if (overcastDays > 0) html += '<div class="fs-item"><span class="fs-emoji">☁️</span><span>阴天</span><span class="fs-val">' + overcastDays + '天</span></div>';
    html += '<span class="fs-meta">' + currentYear + '年 · ' + currentCity + '</span>';
    html += '</div>';

    html += '<div class="weather-calendar"><table class="wc-table">';
    html += '<thead><tr><th style="width:50px;"></th>';
    for (var i = startIdx; i < endIdx; i++) {
        var dateStr = d26.time[i];
        var p = dateStr.split('-');
        var mm = parseInt(p[1]), dd = parseInt(p[2]);
        var weekDay = ['日','一','二','三','四','五','六'][new Date(dateStr).getDay()];
        var isToday = (i === todayIdx);
        var isFuture = (dateStr > today);
        var cls = isToday ? 'today-col' : (isFuture ? 'future-col' : '');
        html += '<th class="' + cls + '">';
        if (isToday) html += '<div style="font-size:8px;color:#b09830;margin-bottom:1px;">TODAY</div>';
        html += mm + '/' + dd + '<div style="font-size:8px;opacity:0.4;margin-top:1px;">周' + weekDay + '</div>';
        html += '</th>';
    }
    html += '</tr></thead><tbody>';

    years.slice().reverse().forEach(function(year) {
        if (!year.data && year.key !== yearKeys[2]) return;
        html += '<tr><td class="wc-row-year ' + year.cssClass + '">' + year.label + '</td>';
        for (var i = 0; i < (endIdx - startIdx); i++) {
            var isToday = (year.key === yearKeys[2]) && (i + startIdx === todayIdx);
            var isFutureCell = (year.key === yearKeys[2]) && (d26.time[i + startIdx] > today);
            var isOtherFuture = (year.key !== yearKeys[2]) && (d26.time[i + startIdx] > today);
            var cls = 'wc-cell';
            if (isToday) cls += ' today-cell';
            if (isFutureCell || isOtherFuture) cls += ' future-cell';

            var wc, maxT, minT;
            if (year.key === yearKeys[2]) {
                // 2026 直接读原始数据
                var si = i + startIdx;
                wc = d26.wc ? d26.wc[si] : null;
                maxT = d26.max[si];
                minT = d26.min[si];
            } else {
                // 2025/2024 读对齐数据
                wc = year.data.wc[i];
                maxT = year.data.max[i];
                minT = year.data.min[i];
            }

            html += '<td class="' + cls + '">';
            html += '<div class="wc-emoji">' + (wc != null ? getWmoEmoji(wc) : '--') + '</div>';
            html += '<div class="wc-text">' + (wc != null ? getWmoShort(wc) : '--') + '</div>';
            html += '<div class="wc-temp">';
            html += '<span class="wc-temp-high">' + (maxT != null ? Math.round(maxT) + '°' : '--') + '</span>';
            html += '<span class="wc-temp-low">' + (minT != null ? Math.round(minT) + '°' : '--') + '</span>';
            html += '</div></td>';
        }
        html += '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
}

// ═══════════════════════════════════════════════════
// Chart.js 通用配置
// ═══════════════════════════════════════════════════
function makeChartOpts(todayLineColor, todayLabelColor) {
    return {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
            legend: {
                position: 'bottom',
                labels: { usePointStyle: true, pointStyle: 'line', font: { size: 11 }, color: 'rgba(120,150,180,0.7)', padding: 16 }
            },
            tooltip: {
                backgroundColor: 'rgba(14,22,35,0.95)',
                borderColor: 'rgba(60,100,140,0.2)',
                borderWidth: 1,
                titleColor: '#8ab0d0',
                bodyColor: '#a0b4cc',
                titleFont: { size: 12 },
                bodyFont: { size: 12 },
                padding: 10,
                cornerRadius: 6,
                callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + Math.round(ctx.raw) + '°C'; } }
            },
            annotation: {
                annotations: {
                    todayLine: {
                        type: 'line',
                        xMin: todayLocalIdx,
                        xMax: todayLocalIdx,
                        borderColor: todayLineColor || 'rgba(176,152,48,0.6)',
                        borderWidth: 1.5,
                        borderDash: [4, 3],
                        label: {
                            display: true,
                            content: '今天',
                            color: todayLabelColor || '#b09830',
                            backgroundColor: 'rgba(14,22,35,0.9)',
                            font: { size: 10, weight: 'bold' },
                            position: 'start',
                            padding: { top: 2, bottom: 2, left: 6, right: 6 },
                            borderRadius: 3,
                        }
                    }
                }
            }
        },
        scales: {
            x: {
                grid: { color: 'rgba(60,100,140,0.04)', drawBorder: false },
                ticks: { font: { size: 9 }, color: 'rgba(120,150,180,0.4)', maxRotation: 0,
                    callback: function(val, idx) { return idx % 2 === 0 ? this.getLabelForValue(val) : ''; }
                }
            },
            y: {
                grid: { color: 'rgba(60,100,140,0.04)', drawBorder: false },
                ticks: { callback: function(v) { return Math.round(v) + '°'; }, font: { size: 10 }, color: 'rgba(120,150,180,0.4)' }
            }
        }
    };
}

var todayLocalIdx = 14; // 全局，由各 chart render 函数设置

function buildDatasets(dataArr, d26, d25, d24, startIdx, endIdx) {
    // d26 用原始数据切片，d25/d24 用按月/日对齐后的数据
    var d26Slice = d26[dataArr].slice(startIdx, endIdx);
    var d25Slice = d25 ? alignByDate(d26, d25, startIdx, endIdx, dataArr) : [];
    var d24Slice = d24 ? alignByDate(d26, d24, startIdx, endIdx, dataArr) : [];
    return [
        {
            label: String(currentYear),
            data: d26Slice,
            borderColor: COLORS.blue,
            backgroundColor: 'rgba(74,144,184,0.08)',
            tension: 0.35, pointRadius: 2.5, pointHoverRadius: 5,
            borderWidth: 2.2, fill: false,
        },
        {
            label: String(currentYear-1),
            data: d25Slice,
            borderColor: COLORS.green,
            backgroundColor: 'rgba(58,154,98,0.06)',
            tension: 0.35, pointRadius: 2, pointHoverRadius: 4,
            borderWidth: 1.8, borderDash: [5, 3], fill: false,
        },
        {
            label: String(currentYear-2),
            data: d24Slice,
            borderColor: COLORS.red,
            backgroundColor: 'rgba(168,104,88,0.05)',
            tension: 0.35, pointRadius: 2, pointHoverRadius: 4,
            borderWidth: 1.8, borderDash: [3, 3], fill: false,
        },
    ];
}

// ═══════════════════════════════════════════════════
// 最高气温对比图
// ═══════════════════════════════════════════════════
function renderMaxTempChart(cityData, today) {
    var d26 = cityData[yearKeys[2]];
    var d25 = cityData[yearKeys[1]];
    var d24 = cityData[yearKeys[0]];

    var todayIdx = d26.time.indexOf(today);
    if (todayIdx < 0) return;

    var startIdx = Math.max(0, todayIdx - 15);
    var endIdx = Math.min(d26.time.length, todayIdx + 16);
    todayLocalIdx = todayIdx - startIdx;

    var labels = [];
    for (var i = startIdx; i < endIdx; i++) labels.push(fmtShort(d26.time[i]));

    // 统计
    var curSlice = d26.max.slice(startIdx, endIdx);
    var curAvg = Math.round(curSlice.reduce(function(a,b){return a+b;},0) / curSlice.length);
    var histMax25 = d25 ? alignByDate(d26, d25, startIdx, endIdx, 'max') : [];
    var histMax24 = d24 ? alignByDate(d26, d24, startIdx, endIdx, 'max') : [];
    var histSlice = histMax25.concat(histMax24).filter(function(v){return v != null;});
    var histAvg = histSlice.length > 0 ? Math.round(histSlice.reduce(function(a,b){return a+b;},0) / histSlice.length) : 0;
    var diff = curAvg - histAvg;
    var diffStr = diff > 0 ? '+' + diff + '°' : diff + '°';
    var diffColor = diff > 0 ? '#b86050' : '#4a90b8';
    document.getElementById('maxChartSummary').innerHTML =
        '今年均值 <span style="color:#b86050;font-weight:700;">' + curAvg + '°C</span> · 历史均值 <span style="color:rgba(120,150,180,0.7);font-weight:700;">' + histAvg + '°C</span> · 偏差 <span style="color:' + diffColor + ';font-weight:700;">' + diffStr + '</span>';

    if (chMax) chMax.destroy();
    chMax = new Chart(document.getElementById('maxTempChart'), {
        type: 'line',
        data: { labels: labels, datasets: buildDatasets('max', d26, d25, d24, startIdx, endIdx) },
        options: makeChartOpts('rgba(176,152,48,0.6)', '#b09830')
    });
}

// 温差对比图

function renderDiffTempChart(cityData, today) {
    var d26 = cityData[yearKeys[2]];
    var d25 = cityData[yearKeys[1]];
    var d24 = cityData[yearKeys[0]];

    var todayIdx = d26.time.indexOf(today);
    if (todayIdx < 0) return;

    var startIdx = Math.max(0, todayIdx - 15);
    var endIdx = Math.min(d26.time.length, todayIdx + 16);
    todayLocalIdx = todayIdx - startIdx;

    var labels = [];
    for (var i = startIdx; i < endIdx; i++) labels.push(fmtShort(d26.time[i]));

    // 计算温差（按月/日对齐）
    var diff26 = d26.max.slice(startIdx, endIdx).map(function(v, i) { return v - d26.min[startIdx + i]; });
    var aMax25 = d25 ? alignByDate(d26, d25, startIdx, endIdx, 'max') : [];
    var aMin25 = d25 ? alignByDate(d26, d25, startIdx, endIdx, 'min') : [];
    var diff25 = aMax25.map(function(v, i) { return (v != null && aMin25[i] != null) ? v - aMin25[i] : null; });
    var aMax24 = d24 ? alignByDate(d26, d24, startIdx, endIdx, 'max') : [];
    var aMin24 = d24 ? alignByDate(d26, d24, startIdx, endIdx, 'min') : [];
    var diff24 = aMax24.map(function(v, i) { return (v != null && aMin24[i] != null) ? v - aMin24[i] : null; });

    if (chDiff) chDiff.destroy();
    chDiff = new Chart(document.getElementById('diffTempChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [
                { label: String(currentYear), data: diff26, borderColor: COLORS.blue, backgroundColor: 'rgba(74,144,184,0.08)', tension: 0.35, pointRadius: 2.5, pointHoverRadius: 5, borderWidth: 2.2, fill: false },

                { label: String(currentYear-2), data: diff24, borderColor: COLORS.red, backgroundColor: 'rgba(168,104,88,0.05)', tension: 0.35, pointRadius: 2, pointHoverRadius: 4, borderWidth: 1.8, borderDash: [3, 3], fill: false },
            ]
        },

    });
}

// ═══════════════════════════════════════════════════
// 多城市对比（数据驱动版本，读 WEATHER_DATA）
// ═══════════════════════════════════════════════════
var CityCompare = (function() {
    var activeCities = [];
    var maxChart = null;
    var minChart = null;
    var cityColors = [
        { main: '#4a90b8', bg: 'rgba(74,144,184,0.15)', border: 'rgba(74,144,184,0.3)' },
        { main: '#3a9a62', bg: 'rgba(58,154,98,0.12)', border: 'rgba(58,154,98,0.25)' },
        { main: '#a86858', bg: 'rgba(168,104,88,0.12)', border: 'rgba(168,104,88,0.25)' },
    ];

    function getAvailableCities() {
        return cityList.filter(function(c) { return activeCities.indexOf(c.name) === -1 && WEATHER_DATA[c.name]; });
    }

    function getTodayRange(cityData) {
        var d = cityData[yearKeys[2]];
        if (!d || !d.time) return null;
        var today = new Date().toISOString().split('T')[0];
        var todayIdx = d.time.indexOf(today);
        if (todayIdx < 0) { todayIdx = d.time.length - 1; }
        var startIdx = Math.max(0, todayIdx - 15);
        var endIdx = Math.min(d.time.length, todayIdx + 16);
        var labels = [];
        for (var i = startIdx; i < endIdx; i++) labels.push(fmtShort(d.time[i]));
        var localToday = todayIdx - startIdx;
        return {
            labels: labels,
            startIdx: startIdx,
            endIdx: endIdx,
            localToday: localToday,
            refTime: d.time
        };
    }

    function updateUI() {
        var bar = document.getElementById('cityTagBar');
        var addBtn = document.getElementById('addCityBtn');
        var emptyState = document.getElementById('cityEmptyState');
        var chartArea = document.getElementById('cityChartArea');
        var legend = document.getElementById('cityLegend');
        var sub = document.getElementById('cityPanelSub');

        // 清除旧标签
        var tags = bar.querySelectorAll('.city-tag-item');
        tags.forEach(function(t) { t.remove(); });

        // 生成城市标签
        activeCities.forEach(function(city, idx) {

            tag.innerHTML = '<span>' + city + '</span><span style="cursor:pointer;opacity:0.6;font-size:14px;line-height:1;" onclick="CityCompare.removeCity(\'' + city.replace(/'/g, "\\'") + '\')">×</span>';
            bar.insertBefore(tag, addBtn);
        });

        addBtn.style.display = activeCities.length >= 3 ? 'none' : 'flex';

        if (activeCities.length === 0) {
            sub.textContent = '最多3个城市 · 同年份对比';
        } else {
            sub.textContent = activeCities.join(' vs ') + ' · ' + currentYear + '年对比';
        }

        if (activeCities.length === 0) {
            emptyState.style.display = 'flex';
            chartArea.style.display = 'none';
        } else {
            emptyState.style.display = 'none';
            chartArea.style.display = 'block';
        }

        // 图例
        legend.innerHTML = '';
        activeCities.forEach(function(city, idx) {
            var c = cityColors[idx];
            var item = document.createElement('div');
            item.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(120,150,180,0.6);';

            legend.appendChild(item);

    function renderCharts() {

        var refRange = getTodayRange(WEATHER_DATA[activeCities[0]]);
        if (!refRange) return;

        var datasetsMax = [];
        var datasetsMin = [];
        activeCities.forEach(function(city, idx) {
            var c = cityColors[idx];
            var d = WEATHER_DATA[city][yearKeys[2]];

                label: city,
                data: d.max.slice(refRange.startIdx, refRange.endIdx),
                borderColor: c.main, backgroundColor: c.bg,
                tension: 0.35, pointRadius: 2, pointHoverRadius: 4,

                label: city,
                data: d.min.slice(refRange.startIdx, refRange.endIdx),

                tension: 0.35, pointRadius: 2, pointHoverRadius: 4,
                borderWidth: 2, borderDash: isNotFirst ? [5, 3] : [], fill: false,
            });
        });

        var chartOpts = {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(14,22,35,0.95)',
                    borderColor: 'rgba(60,100,140,0.2)',
                    borderWidth: 1,
                    titleColor: '#8ab0d0', bodyColor: '#a0b4cc',

                    callbacks: { label: function(ctx) { return ctx.dataset.label + ': ' + Math.round(ctx.raw) + '°C'; } }

                annotation: {

                        todayLine: {
                            type: 'line',
                            xMin: refRange.localToday, xMax: refRange.localToday,

                                backgroundColor: 'rgba(14,22,35,0.9)',
                                font: { size: 9, weight: 'bold' }, position: 'start',

                    }

            scales: {

                        callback: function(val, idx) { return idx % 3 === 0 ? this.getLabelForValue(val) : ''; } } },
                y: { grid: { color: 'rgba(60,100,140,0.04)', drawBorder: false },

            type: 'line', data: { labels: refRange.labels, datasets: datasetsMin }, options: chartOpts

            var hint = document.getElementById('cityDialogActiveHint');
            var hintList = document.getElementById('cityDialogActiveList');
            if (activeCities.length > 0) {
                hint.style.display = 'block';
                hintList.textContent = activeCities.join(' / ');
            } else {
                hint.style.display = 'none';
            }
            setTimeout(function() { document.getElementById('citySearchInput').focus(); }, 100);
        },
        closeDialog: function() {
            document.getElementById('cityDialogOverlay').style.display = 'none';
            document.getElementById('cityDialogOverlay').classList.remove('open');
        },
        filterCities: function(val) {
            renderDialogList(val);
        },
        addCity: function(city) {
            if (activeCities.length >= 3) return;
            if (activeCities.indexOf(city) !== -1) return;
            if (!WEATHER_DATA[city]) return;
            activeCities.push(city);
            updateUI();
            if (activeCities.length >= 3) {
                document.getElementById('cityDialogOverlay').style.display = 'none';
                document.getElementById('cityDialogOverlay').classList.remove('open');
            } else {
                renderDialogList(document.getElementById('citySearchInput').value);
                document.getElementById('cityDialogActiveList').textContent = activeCities.join(' / ');
            }
        },
        removeCity: function(city) {
            var idx = activeCities.indexOf(city);
            if (idx === -1) return;
            activeCities.splice(idx, 1);
            updateUI();
        }
    };
})();

// ═══════════════════════════════════════════════════
// 截图分享
// ═══════════════════════════════════════════════════
async function takeScreenshot() {
    try {
        await new Promise(function(r) { setTimeout(r, 300); });
        var canvas = await html2canvas(document.getElementById('dashboard'), {
            scale: 2, useCORS: true, backgroundColor: '#0c1018', logging: false,
            ignoreElements: function(el) { return el.id === 'cityDialogOverlay' || el.id === 'toast'; }
        });
        canvas.toBlob(async function(blob) {
            var saved = false;
            try {
                await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
                showToast('✓ 已复制到剪贴板');
                saved = true;
            } catch(e) {}
            if (!saved) {
                var url = canvas.toDataURL('image/png');
                var a = document.createElement('a');
                a.href = url;
                a.download = 'weather_hud_' + (currentCity || 'nocity') + '_' + new Date().toLocaleDateString('en-US') + '.png';
                a.click();
                showToast('✓ 图片已保存');
            }
        });
    } catch(err) { showToast('✗ 截图失败，请重试'); }
}
</script>
