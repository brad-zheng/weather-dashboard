name: 每日天气数据更新

on:
  # 每天凌晨 3:00（北京时间）自动执行
  schedule:
    - cron: "0 19 * * *"   # UTC 19:00 = 北京时间 03:00
  # 也可以手动触发（在 GitHub 仓库的 Actions 页面点 Run workflow）
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: pip install requests

      - name: 执行数据抓取
        run: python data_fetch.py
        env:
          TZ: Asia/Shanghai
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}

      - name: 提交并推送 data.js
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js
          git diff --staged --quiet || git commit -m "🤖 自动更新天气数据 $(date +'%Y-%m-%d %H:%M')"
          git push
